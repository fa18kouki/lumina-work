<!--
  Supabase Dashboard > Authentication > Email Templates > Confirm signup
  Subject: LUMINAへようこそ - メールアドレスの確認
-->
<table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f7; padding: 40px 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Yu Gothic', YuGothic, Meiryo, sans-serif;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Yu Gothic', YuGothic, Meiryo, sans-serif;">
        <!-- Header -->
        <tr>
          <td style="background: #ffffff; padding: 32px 40px; border-radius: 12px 12px 0 0; text-align: center; border-bottom: 1px solid #f0f0f0;">
            <img src="{{ .SiteURL }}/Apple_Touch_Icon_180x180.png" alt="LUMINA" width="80" height="80" style="display: block; margin: 0 auto 8px; border: 0;" />
            <p style="margin: 0; font-size: 11px; color: #9ca3af; letter-spacing: 1px;">キャストマッチングプラットフォーム</p>
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="background: #ffffff; padding: 40px;">
            <h2 style="margin: 0 0 8px; font-size: 20px; font-weight: 700; color: #1a1a2e;">アカウント登録ありがとうございます</h2>
            <p style="margin: 0 0 24px; font-size: 14px; color: #6b7280; line-height: 1.6;">
              LUMINAへのご登録ありがとうございます。<br>
              以下のボタンをクリックして、メールアドレスの確認を完了してください。
            </p>

            <!-- CTA Button -->
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center" style="padding: 8px 0 32px;">
                  <a href="{{ .ConfirmationURL }}"
                     style="display: inline-block; background: linear-gradient(135deg, #e88da4 0%, #a78bdb 50%, #6da0d6 100%); color: #ffffff; padding: 14px 48px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 15px; letter-spacing: 0.5px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Yu Gothic', YuGothic, Meiryo, sans-serif;">
                    メールアドレスを確認する
                  </a>
                </td>
              </tr>
            </table>

            <!-- Divider -->
            <div style="border-top: 1px solid #e5e7eb; margin: 0 0 24px;"></div>

            <p style="margin: 0; font-size: 13px; color: #9ca3af; line-height: 1.8;">
              ボタンが機能しない場合は、以下のURLをブラウザに直接貼り付けてください。<br>
              <a href="{{ .ConfirmationURL }}" style="color: #6366f1; word-break: break-all; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Yu Gothic', YuGothic, Meiryo, sans-serif;">{{ .ConfirmationURL }}</a>
            </p>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="background: #f9fafb; padding: 24px 40px; border-radius: 0 0 12px 12px; border-top: 1px solid #e5e7eb;">
            <p style="margin: 0 0 4px; font-size: 12px; color: #9ca3af; text-align: center; line-height: 1.8;">
              このメールはLUMINAから自動送信されています。<br>
              心当たりがない場合は、このメールを無視してください。
            </p>
            <p style="margin: 8px 0 0; font-size: 11px; color: #d1d5db; text-align: center;">
              &copy; LUMINA All rights reserved.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
